<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="tankG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>
    <linearGradient id="liquidG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#444444"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaaaaa"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="url(#bgG)" rx="12"/>
  <text x="450" y="30" text-anchor="middle" fill="#cccccc" font-size="14" font-weight="bold" letter-spacing="3">CSTR STEADY-STATE SOLVER</text>
  <line x1="60" y1="42" x2="840" y2="42" stroke="#333333" stroke-width="1"/>

  <!-- Feed pipe -->
  <line x1="62" y1="148" x2="152" y2="148" stroke="#aaaaaa" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="38" y="136" fill="#888888" font-size="11">CA0</text>
  <text x="38" y="152" fill="#888888" font-size="11">Feed</text>

  <!-- Tank -->
  <rect x="155" y="78" width="160" height="175" rx="6" fill="url(#tankG)" stroke="#444444" stroke-width="1.8"/>
  <rect x="157" y="162" width="156" height="89" rx="4" fill="url(#liquidG)" opacity="0.85"/>

  <!-- Agitator -->
  <line x1="235" y1="80" x2="235" y2="132" stroke="#3a3a3a" stroke-width="3"/>
  <rect x="214" y="128" width="42" height="8" rx="2" fill="#3a3a3a"/>
  <rect x="208" y="140" width="54" height="6" rx="2" fill="#3a3a3a"/>
  <path d="M 235 178 Q 255 193 235 212 Q 215 228 235 244" stroke="#555555" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="235,244 230,236 240,236" fill="#555555"/>

  <text x="235" y="108" text-anchor="middle" fill="#cccccc" font-size="12" font-weight="bold">CSTR</text>
  <text x="235" y="124" text-anchor="middle" fill="#555555" font-size="9">k, τ, CA0</text>
  <text x="235" y="278" text-anchor="middle" fill="#666666" font-size="10">−rA = k · CA</text>

  <!-- Outlet -->
  <line x1="315" y1="148" x2="392" y2="148" stroke="#aaaaaa" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="322" y="136" fill="#999999" font-size="11">CA, X</text>
  <text x="322" y="160" fill="#555555" font-size="9">product</text>

  <!-- Mole balance box -->
  <rect x="62" y="308" width="330" height="80" rx="5" fill="#111111" stroke="#2e2e2e" stroke-width="1.5"/>
  <text x="227" y="328" text-anchor="middle" fill="#555555" font-size="10" letter-spacing="1">MOLE BALANCE</text>
  <text x="227" y="352" text-anchor="middle" fill="#bbbbbb" font-size="13">τ = (CA0 − CA) / (k · CA)</text>
  <text x="227" y="374" text-anchor="middle" fill="#eeeeee" font-size="13" font-weight="bold">X = kτ / (1 + kτ)</text>

  <!-- RIGHT: Convergence chart -->
  <text x="490" y="68" text-anchor="middle" fill="#666666" font-size="11" letter-spacing="2">CONVERGENCE COMPARISON</text>

  <line x1="430" y1="290" x2="845" y2="290" stroke="#333333" stroke-width="1.5"/>
  <line x1="430" y1="78" x2="430" y2="290" stroke="#333333" stroke-width="1.5"/>
  <text x="638" y="314" text-anchor="middle" fill="#555555" font-size="10">Iterations</text>
  <text x="408" y="188" text-anchor="middle" fill="#555555" font-size="10" transform="rotate(-90,408,188)">|Error| (log scale)</text>

  <text x="424" y="92"  text-anchor="end" fill="#444444" font-size="9">10⁻⁶</text>
  <text x="424" y="140" text-anchor="end" fill="#444444" font-size="9">10⁻⁴</text>
  <text x="424" y="190" text-anchor="end" fill="#444444" font-size="9">10⁻²</text>
  <text x="424" y="242" text-anchor="end" fill="#444444" font-size="9">10⁻¹</text>
  <text x="424" y="290" text-anchor="end" fill="#444444" font-size="9">10⁰</text>

  <line x1="430" y1="140" x2="845" y2="140" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="430" y1="190" x2="845" y2="190" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="430" y1="242" x2="845" y2="242" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="430" y="304" text-anchor="middle" fill="#444444" font-size="9">0</text>
  <text x="512" y="304" text-anchor="middle" fill="#444444" font-size="9">5</text>
  <text x="594" y="304" text-anchor="middle" fill="#444444" font-size="9">10</text>
  <text x="676" y="304" text-anchor="middle" fill="#444444" font-size="9">15</text>
  <text x="758" y="304" text-anchor="middle" fill="#444444" font-size="9">20</text>

  <!-- Bisection: slow dashed dim -->
  <polyline points="430,248 447,240 464,233 481,226 498,219 515,212 532,203 549,194 566,184 583,174 600,164 617,155 634,146 651,138 668,131 685,123 702,116 719,108 736,101 753,94"
    stroke="#666666" stroke-width="1.8" fill="none" stroke-dasharray="6,3" stroke-linecap="round"/>

  <!-- Newton-Raphson: white, bold -->
  <polyline points="430,248 512,178 564,94"
    stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Secant: mid-gray -->
  <polyline points="430,248 512,204 578,132 622,94"
    stroke="#aaaaaa" stroke-width="2" fill="none" stroke-linecap="round"/>

  <circle cx="753" cy="94" r="4" fill="#666666"/>
  <circle cx="564" cy="94" r="5" fill="#ffffff"/>
  <circle cx="622" cy="94" r="4" fill="#aaaaaa"/>

  <!-- Legend -->
  <rect x="648" y="198" width="190" height="78" rx="5" fill="#111111" stroke="#2e2e2e" stroke-width="1"/>
  <line x1="660" y1="219" x2="690" y2="219" stroke="#666666" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="698" y="223" fill="#777777" font-size="11">Bisection (20 iters)</text>
  <line x1="660" y1="241" x2="690" y2="241" stroke="#ffffff" stroke-width="2.5"/>
  <text x="698" y="245" fill="#eeeeee" font-size="11">Newton-Raphson (2)</text>
  <line x1="660" y1="263" x2="690" y2="263" stroke="#aaaaaa" stroke-width="2"/>
  <text x="698" y="267" fill="#aaaaaa" font-size="11">Secant (2–3 iters)</text>
</svg>
